services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: trust_platform
      POSTGRES_USER: trust_user
      POSTGRES_PASSWORD: trust_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trust_user -d trust_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./scripts:/app/scripts
    environment:
      - DATABASE_URL=postgresql+asyncpg://trust_user:trust_pass@db:5432/trust_platform
      - AI_BACKEND=${AI_BACKEND:-mock}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ENVIRONMENT=local
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn src.python.api.main:app --host 0.0.0.0 --port 8080 --reload"

  worker:
    build: .
    volumes:
      - ./src:/app/src
    environment:
      - DATABASE_URL=postgresql+asyncpg://trust_user:trust_pass@db:5432/trust_platform
      - AI_BACKEND=${AI_BACKEND:-mock}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ENVIRONMENT=local
    depends_on:
      db:
        condition: service_healthy
    command: python -m src.python.interpretation.pipeline --watch

volumes:
  postgres_data:
